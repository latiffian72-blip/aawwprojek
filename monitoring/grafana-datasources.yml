apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: db:5432
    database: asap_monitor
    user: user
    secureJsonData:
      password: password
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      database: asap_monitor
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
